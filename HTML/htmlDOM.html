<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
    <!-- JavaScript uses DOM to find the element. -->
    <script>
        let element = document.getElementById("title");
        console.log(element);
    </script>
</head>
<body>
    <!-- DOM (Document Object Model) is a programming interface that represents an HTML 
     document as a tree of objects (nodes) 
    DOM is a structured representation of an HTML document where each element is treated 
    as an object, allowing programs to dynamically access and update content, structure, and style.
    Key Points
    DOM = Tree structure of HTML
    Each element = Object
    JavaScript uses DOM to control web pages
    Enables dynamic websites
    Short Summary
    DOM converts HTML into a tree of objects
    It allows JavaScript to interact with web pages
    Used for updating content, style, and structure -->

    <h1 id="title">Hello World</h1>

</body>
</html>
